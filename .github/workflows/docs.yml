name: docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/test_check_markdown_links.py
      - run: python3 scripts/check_markdown_links.py
      - run: python3 scripts/test_check_snippet_inventory.py
      - run: python3 scripts/check_snippet_inventory.py
